services:
  db:
    image: postgres:16-alpine
    container_name: psicomichi-db-qa
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psicomichi_db}
      POSTGRES_USER: ${POSTGRES_USER:-psicomichi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-psicomichi_password}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5433}:5432"
    volumes:
      - psicomichi_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psicomichi_user} -d ${POSTGRES_DB:-psicomichi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: psicomichi-api-qa
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "${API_EXTERNAL_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: []

volumes:
  psicomichi_db_data: